<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .text { font: 16px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 2; rx: 16; ry: 16; }
      .soft { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 16; ry: 16; }
      .blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; rx: 18; ry: 18; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 2.5; rx: 18; ry: 18; }
      .orange { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; rx: 18; ry: 18; }
      .pink { fill: #fdf2f8; stroke: #db2777; stroke-width: 2.5; rx: 18; ry: 18; }
      .gray { fill: #f3f4f6; stroke: #6b7280; stroke-width: 2; rx: 12; ry: 12; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #6b7280; stroke-width: 2.5; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrowheadGray); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#111827"/>
    </marker>
    <marker id="arrowheadGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="920" fill="#f8fafc"/>
  <text x="56" y="58" class="title">priority-condvar: cond_wait 와 semaphore_elem 구조</text>
  <text x="56" y="92" class="subtitle">핵심: cond-&gt;waiters 에는 스레드가 아니라 semaphore_elem 이 들어가고, 실제 잠자는 스레드는 그 안의 semaphore.waiters 에 들어간다.</text>

  <rect x="58" y="138" width="1284" height="178" class="blue"/>
  <text x="86" y="176" class="label">1. cond_wait() 에 들어오면</text>
  <rect x="88" y="198" width="240" height="88" class="box"/>
  <text x="106" y="232" class="text">현재 스레드</text>
  <text x="106" y="258" class="small">thread_current()</text>

  <rect x="382" y="188" width="312" height="108" class="green"/>
  <text x="404" y="224" class="text">지역 변수 waiter</text>
  <text x="404" y="250" class="small">struct semaphore_elem</text>
  <text x="404" y="274" class="small">멤버: elem, semaphore, priority</text>

  <rect x="754" y="188" width="548" height="108" class="orange"/>
  <text x="776" y="224" class="text">cond-&gt;waiters 에 들어가는 것</text>
  <text x="776" y="250" class="small">&amp;waiter.elem</text>
  <text x="776" y="274" class="small">즉, 스레드 자체가 아니라 semaphore_elem 을 대표하는 리스트 노드</text>

  <path d="M328 242 L382 242" class="arrow"/>
  <path d="M694 242 L754 242" class="arrow"/>

  <text x="86" y="334" class="label">2. semaphore_elem 내부는 이렇게 갈라져 있다</text>

  <rect x="72" y="366" width="518" height="388" class="green"/>
  <text x="98" y="408" class="label">semaphore_elem (waiter)</text>

  <rect x="104" y="438" width="180" height="92" class="gray"/>
  <text x="122" y="474" class="text">elem</text>
  <text x="122" y="500" class="small">cond-&gt;waiters 에</text>
  <text x="122" y="520" class="small">정렬되어 저장되는 노드</text>

  <rect x="312" y="438" width="236" height="92" class="gray"/>
  <text x="330" y="474" class="text">priority</text>
  <text x="330" y="500" class="small">정렬 기준으로 따로 저장</text>
  <text x="330" y="520" class="small">예: waiter.priority</text>

  <rect x="104" y="570" width="412" height="148" class="soft"/>
  <text x="126" y="608" class="text">semaphore</text>
  <text x="126" y="634" class="small">value: 세마포어 값</text>
  <text x="126" y="658" class="small">waiters: 이 세마포어에서 잠자는 스레드 리스트</text>
  <text x="126" y="686" class="small">여기가 실제로 thread_current()-&gt;elem 이 들어가는 곳</text>

  <path d="M194 530 L194 570" class="dash"/>
  <path d="M430 530 L430 570" class="dash"/>

  <rect x="636" y="366" width="706" height="388" class="pink"/>
  <text x="664" y="408" class="label">잠드는 실제 경로</text>

  <rect x="674" y="442" width="296" height="84" class="box"/>
  <text x="694" y="476" class="text">sema_down(&amp;waiter.semaphore)</text>
  <text x="694" y="502" class="small">value == 0 이면 대기 시작</text>

  <rect x="1014" y="442" width="284" height="84" class="box"/>
  <text x="1034" y="476" class="text">waiter.semaphore.waiters</text>
  <text x="1034" y="502" class="small">세마포어 내부 대기 큐</text>

  <rect x="848" y="580" width="276" height="94" class="orange"/>
  <text x="870" y="616" class="text">thread_current()-&gt;elem</text>
  <text x="870" y="642" class="small">현재 스레드가 이 큐에 들어감</text>

  <rect x="674" y="690" width="624" height="40" class="gray"/>
  <text x="694" y="716" class="small">즉 cond-&gt;waiters 와 semaphore.waiters 는 역할이 다르다.</text>

  <path d="M970 484 L1014 484" class="arrow"/>
  <path d="M1156 526 L1002 580" class="arrow"/>

  <text x="58" y="794" class="label">3. 왜 priority 를 semaphore_elem 에 따로 넣는가</text>
  <rect x="58" y="814" width="1284" height="78" class="orange"/>
  <text x="84" y="848" class="text">cond-&gt;waiters 는 semaphore_elem 을 담는 리스트이므로, 정렬 기준도 semaphore_elem 에서 바로 꺼낼 수 있어야 한다.</text>
  <text x="84" y="874" class="small">그래서 waiter.priority 를 넣어 두면 cond_signal() 이 pop_front() 만 해도 가장 높은 우선순위 waiter 를 깨울 수 있다.</text>

  <path d="M590 560 L636 560" class="dash"/>
  <text x="604" y="548" class="small">1:1 대응</text>
</svg>
